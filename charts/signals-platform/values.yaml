# Sustituir por vuestro registry (ghcr.io/<org>/...) tras el primer push de imágenes.
images:
  marketData: signalsregistry.azurecr.io/market-data:latest
  signalEngine: signalsregistry.azurecr.io/signal-engine:latest
  apiBff: signalsregistry.azurecr.io/api-bff:latest
  webUi: signalsregistry.azurecr.io/web-ui:latest
  # Usados en desarrollo local
  # marketData: ghcr.io/visualr29/signals-market-data:latest
  # signalEngine: ghcr.io/visualr29/signals-signal-engine:latest
  # apiBff: ghcr.io/visualr29/signals-api-bff:latest
  # webUi: ghcr.io/visualr29/signals-web-ui:latest

# imagePullSecrets:
  # - name: regcred

nameOverride: ""
fullnameOverride: ""

ingress:
  enabled: true
  className: nginx
  host: signals.local.test
  annotations: {}

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: 16.3.0-debian-12-r0
  auth:
    username: signals
    password: signals-dev-password
    database: signals
  primary:
    persistence:
      enabled: true
      size: 2Gi

marketData:
  replicas: 1
  extraEnv:
    MARKET_PROVIDER_ORDER: "tiingo,twelvedata,mock"
    # MARKET_ALLOWED_SYMBOLS: "AAPL,MSFT"
    # MARKET_STALE_AFTER_SECONDS: "86400"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

signalEngine:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

apiBff:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

webUi:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 128Mi

prometheus:
  serviceMonitor:
    enabled: false
