apiVersion: v1
kind: Secret
metadata:
  name: {{ include "signals-platform.fullname" . }}-db-url
  labels:
    app.kubernetes.io/name: {{ include "signals-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  url: >-
    postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}
