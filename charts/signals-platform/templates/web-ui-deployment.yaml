apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signals-platform.fullname" . }}-web-ui
  labels:
    app.kubernetes.io/name: web-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.webUi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: web-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-ui
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web-ui
          image: {{ .Values.images.webUi | quote }}
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.webUi.resources | nindent 12 }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "signals-platform.fullname" . }}-web-ui-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "signals-platform.fullname" . }}-web-ui
  labels:
    app.kubernetes.io/name: web-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: http
