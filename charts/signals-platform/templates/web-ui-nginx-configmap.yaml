apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "signals-platform.fullname" . }}-web-ui-nginx
  labels:
    app.kubernetes.io/name: web-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://{{ include "signals-platform.fullname" . }}-api-bff:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
