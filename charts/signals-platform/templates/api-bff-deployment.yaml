apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signals-platform.fullname" . }}-api-bff
  labels:
    app.kubernetes.io/name: api-bff
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.apiBff.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api-bff
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-bff
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-bff
          image: {{ .Values.images.apiBff | quote }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MARKET_DATA_BASE_URL
              value: http://{{ include "signals-platform.fullname" . }}-market-data:8000
            - name: SIGNAL_ENGINE_BASE_URL
              value: http://{{ include "signals-platform.fullname" . }}-signal-engine:8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.apiBff.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "signals-platform.fullname" . }}-api-bff
  labels:
    app.kubernetes.io/name: api-bff
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app.kubernetes.io/name: api-bff
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8000
      targetPort: http
