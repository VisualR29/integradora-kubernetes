apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signals-platform.fullname" . }}-market-data
  labels:
    app.kubernetes.io/name: market-data
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.marketData.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: market-data
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: market-data
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: market-data
          image: {{ .Values.images.marketData | quote }}
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          env:
            - name: MARKET_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "signals-platform.fullname" . }}-db-url
                  key: url
            {{- range $k, $v := .Values.marketData.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.marketData.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "signals-platform.fullname" . }}-market-data
  labels:
    app.kubernetes.io/name: market-data
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app.kubernetes.io/name: market-data
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8000
      targetPort: http
