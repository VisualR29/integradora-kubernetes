services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signals
      POSTGRES_PASSWORD: signals
      POSTGRES_DB: signals
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signals -d signals"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  market-data:
    build:
      context: ./services/market-data
    ports:
      - "8001:8000"
    environment:
      MARKET_DATABASE_URL: postgresql+asyncpg://signals:signals@postgres:5432/signals
      MARKET_PROVIDER_ORDER: ${MARKET_PROVIDER_ORDER:-tiingo,twelvedata,mock}
      MARKET_TIINGO_TOKEN: ${MARKET_TIINGO_TOKEN:-}
      MARKET_TWELVEDATA_API_KEY: ${MARKET_TWELVEDATA_API_KEY:-}
      MARKET_STALE_AFTER_SECONDS: ${MARKET_STALE_AFTER_SECONDS:-86400}
      MARKET_ALLOWED_SYMBOLS: ${MARKET_ALLOWED_SYMBOLS:-}
    depends_on:
      postgres:
        condition: service_healthy

  signal-engine:
    build:
      context: ./services/signal-engine
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://signals:signals@postgres:5432/signals
      MARKET_DATA_BASE_URL: http://market-data:8000
    depends_on:
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started

  api-bff:
    build:
      context: ./services/api-bff
    ports:
      - "8080:8000"
    environment:
      MARKET_DATA_BASE_URL: http://market-data:8000
      SIGNAL_ENGINE_BASE_URL: http://signal-engine:8000
    depends_on:
      - market-data
      - signal-engine

  web-ui:
    build:
      context: ./web-ui
    ports:
      - "3000:80"
    depends_on:
      - api-bff

volumes:
  postgres_data:
