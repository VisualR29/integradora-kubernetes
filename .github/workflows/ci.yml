name: CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]

env:
  REGISTRY: ghcr.io

jobs:
  python-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Asegúrate de que estos nombres coincidan EXACTAMENTE con tus carpetas
        service: [market-data, signal-engine, api-bff]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalamos las herramientas de test PRIMERO para asegurar el PATH
          pip install ruff pytest httpx
          # Instalamos el resto de las dependencias
          pip install -r services/${{ matrix.service }}/requirements.txt
      - name: Ruff check
        # Cambiamos a working-directory para que ruff no se pierda con las rutas
        working-directory: services/${{ matrix.service }}
        run: ruff check app tests

      - name: Pytest
        working-directory: services/${{ matrix.service }}
        # Ejecutamos pytest directamente; usará el pytest.ini que vimos en tu captura
        run: pytest -v

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          # Contexto es la carpeta del servicio donde está el Dockerfile
          context: services/${{ matrix.service }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/signals-${{ matrix.service }}:ci-${{ github.sha }}

  web-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package.json

      - name: Install and build
        working-directory: web-ui
        run: |
          npm install
          npm run build

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: web-ui
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/signals-web-ui:ci-${{ github.sha }}