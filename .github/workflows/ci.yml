name: CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]

env:
  REGISTRY: ghcr.io

jobs:
  python-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [market-data, signal-engine, api-bff]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install ruff pytest

      - name: Ruff check
        run: ruff check services/${{ matrix.service }}/app services/${{ matrix.service }}/tests

      - name: Pytest
        working-directory: services/${{ matrix.service }}
        run: pytest -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/signals-${{ matrix.service }}:ci-${{ github.sha }}

  web-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package.json

      - name: Install and build
        working-directory: web-ui
        run: |
          npm install
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: web-ui
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/signals-web-ui:ci-${{ github.sha }}
